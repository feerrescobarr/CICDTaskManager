name: Javadoc

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  javadoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Generate Javadoc
        run: mvn javadoc:javadoc --batch-mode